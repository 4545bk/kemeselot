name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: npm install
    
    - name: Fix gradlew line endings and permissions
      run: |
        cd android
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
    
    - name: Generate debug keystore if missing
      run: |
        if [ ! -f android/app/debug.keystore ]; then
          keytool -genkey -v -keystore android/app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
        fi
    
    - name: Build Debug APK
      run: npx react-native build-android --mode=debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kemeselot-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
